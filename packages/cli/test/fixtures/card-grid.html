<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        width: 800px;
        height: 360px;
        background-color: #f5f5f7;
        font-family: Inter, sans-serif;
      }
      .grid {
        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        gap: 16px;
        padding: 24px;
      }
      .card {
        width: 240px;
        height: 140px;
        background-color: #ffffff;
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .title {
        font-size: 16px;
        font-weight: 600;
        color: #0f172a;
      }
      .body {
        font-size: 14px;
        color: #475569;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="card">
        <div class="title">Fast</div>
        <div class="body">Ships HTML to Figma in seconds.</div>
      </div>
      <div class="card">
        <div class="title">Editable</div>
        <div class="body">Real frames, real auto-layout, real components.</div>
      </div>
      <div class="card">
        <div class="title">Open</div>
        <div class="body">MIT-licensed. Extend the IR, swap the plugin.</div>
      </div>
      <div class="card">
        <div class="title">Typed</div>
        <div class="body">IR is zod-defined and TS-inferred.</div>
      </div>
      <div class="card">
        <div class="title">Tested</div>
        <div class="body">120 tests across the workspace.</div>
      </div>
      <div class="card">
        <div class="title">Composable</div>
        <div class="body">CLI and plugin can be swapped independently.</div>
      </div>
    </div>
  </body>
</html>

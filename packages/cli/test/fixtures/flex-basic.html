<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        width: 800px;
        height: 200px;
        background-color: #ffffff;
        font-family: Inter, sans-serif;
      }
      .row {
        display: flex;
        flex-direction: row;
        gap: 20px;
        padding: 24px;
        align-items: center;
        background-color: #f1f5f9;
        height: 200px;
      }
      .pill {
        display: flex;
        width: 120px;
        height: 40px;
        background-color: #2563eb;
        border-radius: 999px;
        padding: 8px 16px;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <div class="pill" id="a"></div>
      <div class="pill" id="b"></div>
      <div class="pill" id="c"></div>
    </div>
  </body>
</html>

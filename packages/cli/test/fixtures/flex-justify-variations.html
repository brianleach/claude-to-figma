<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        width: 800px;
        height: 480px;
        background-color: #ffffff;
        font-family: Inter, sans-serif;
      }
      .row {
        display: flex;
        flex-direction: row;
        align-items: center;
        height: 60px;
        padding: 0 16px;
        background-color: #f1f5f9;
        margin-bottom: 16px;
      }
      .start    { justify-content: flex-start; }
      .center   { justify-content: center; }
      .end      { justify-content: flex-end; }
      .between  { justify-content: space-between; }
      .pill {
        width: 80px;
        height: 32px;
        background-color: #2563eb;
        border-radius: 16px;
      }
    </style>
  </head>
  <body>
    <div class="row start">
      <div class="pill" id="s1"></div>
      <div class="pill" id="s2"></div>
    </div>
    <div class="row center">
      <div class="pill" id="c1"></div>
      <div class="pill" id="c2"></div>
    </div>
    <div class="row end">
      <div class="pill" id="e1"></div>
      <div class="pill" id="e2"></div>
    </div>
    <div class="row between">
      <div class="pill" id="b1"></div>
      <div class="pill" id="b2"></div>
      <div class="pill" id="b3"></div>
    </div>
  </body>
</html>

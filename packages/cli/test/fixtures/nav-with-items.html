<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        width: 800px;
        height: 80px;
        background-color: #0f172a;
        font-family: Inter, sans-serif;
      }
      .nav {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: flex-end;
        gap: 32px;
        padding: 0 24px;
        height: 80px;
      }
      .item {
        display: flex;
        align-items: center;
        height: 40px;
        padding: 8px 12px;
        background-color: transparent;
      }
      .item .label {
        font-size: 14px;
        font-weight: 500;
        color: #f1f5f9;
      }
    </style>
  </head>
  <body>
    <div class="nav">
      <div class="item"><span class="label">Home</span></div>
      <div class="item"><span class="label">Docs</span></div>
      <div class="item"><span class="label">Pricing</span></div>
      <div class="item"><span class="label">Blog</span></div>
      <div class="item"><span class="label">Contact</span></div>
    </div>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <title>Simple divs</title>
  </head>
  <body style="width: 800px; height: 600px; background-color: #f5f5f7;">
    <div id="card" style="position: relative; width: 320px; height: 180px; left: 40px; top: 40px; background-color: #ffffff; border-radius: 12px; padding: 16px;">
      <h2 style="color: #1a1a1a; font-size: 20px; font-weight: 600;">Hello</h2>
      <p style="color: #555555; font-size: 14px; line-height: 1.5;">A short paragraph that introduces the card.</p>
    </div>
    <div id="cta" style="position: relative; width: 160px; height: 40px; left: 40px; top: 60px; background-color: #2563eb; border-radius: 8px;">
      <span style="color: #ffffff; font-size: 14px; font-weight: 500; text-align: center;">Get started</span>
    </div>
  </body>
</html>

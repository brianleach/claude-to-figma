<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>claude-to-figma</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #0a0a0a;
        --muted: #6b7280;
        --border: #e5e7eb;
        --accent: #3366ff;
        --accent-hover: #2952d9;
        --error-bg: #fef2f2;
        --error-fg: #b91c1c;
        --ok-bg: #ecfdf5;
        --ok-fg: #047857;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg); }
      body { display: flex; flex-direction: column; padding: 12px; gap: 10px; font-size: 12px; }
      header { display: flex; justify-content: space-between; align-items: center; }
      h1 { font-size: 13px; margin: 0; font-weight: 600; }
      .hint { color: var(--muted); font-size: 11px; }
      textarea {
        flex: 1;
        min-height: 260px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
        font-size: 11px;
        resize: vertical;
        outline: none;
      }
      textarea:focus { border-color: var(--accent); }
      .actions { display: flex; gap: 8px; }
      button {
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: #f9fafb;
        color: var(--fg);
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
      }
      button.primary {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      button.primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
      button:disabled { opacity: 0.6; cursor: default; }
      .status {
        padding: 8px 10px;
        border-radius: 6px;
        font-size: 11px;
        white-space: pre-wrap;
        font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      }
      .status.error { background: var(--error-bg); color: var(--error-fg); }
      .status.ok { background: var(--ok-bg); color: var(--ok-fg); }
      .status.hidden { display: none; }
    </style>
  </head>
  <body>
    <header>
      <h1>claude-to-figma</h1>
      <span class="hint">Paste IR JSON → Build</span>
    </header>
    <textarea
      id="ir"
      spellcheck="false"
      placeholder='{ "version": 1, "root": { "type": "FRAME", "id": "root" } }'
    ></textarea>
    <div class="actions">
      <button class="primary" id="build">Build</button>
      <button id="sample">Load sample</button>
      <button id="clear">Clear</button>
    </div>
    <div id="status" class="status hidden"></div>

    <script>
      const $ir = document.getElementById('ir');
      const $build = document.getElementById('build');
      const $sample = document.getElementById('sample');
      const $clear = document.getElementById('clear');
      const $status = document.getElementById('status');

      function setStatus(kind, text) {
        $status.className = 'status ' + kind;
        $status.textContent = text;
      }
      function clearStatus() {
        $status.className = 'status hidden';
        $status.textContent = '';
      }

      $build.addEventListener('click', () => {
        const ir = $ir.value.trim();
        if (!ir) {
          setStatus('error', 'Paste IR JSON first.');
          return;
        }
        clearStatus();
        $build.disabled = true;
        $build.textContent = 'Building…';
        parent.postMessage({ pluginMessage: { type: 'build', ir } }, '*');
      });

      $clear.addEventListener('click', () => {
        $ir.value = '';
        clearStatus();
      });

      $sample.addEventListener('click', () => {
        $ir.value = SAMPLE_IR_JSON;
        clearStatus();
      });

      window.addEventListener('message', (event) => {
        const msg = event.data.pluginMessage;
        if (!msg) return;
        $build.disabled = false;
        $build.textContent = 'Build';
        if (msg.type === 'build:ok') {
          setStatus(
            'ok',
            'Built ' + msg.stats.nodes + ' nodes, ' + msg.stats.components + ' components.',
          );
        } else if (msg.type === 'build:error') {
          setStatus('error', msg.message);
        }
      });

      // Minimal sample so users can click "Load sample" without leaving Figma.
      // For the full M1 demo, paste packages/ir/examples/sample.json.
      const SAMPLE_IR_JSON = JSON.stringify(
        {
          version: 1,
          name: 'Minimal',
          fonts: [{ family: 'Inter', style: 'Regular' }],
          images: [],
          styles: { paints: [], texts: [] },
          components: [],
          root: {
            type: 'FRAME',
            id: 'root',
            name: 'Hello',
            geometry: { x: 0, y: 0, width: 400, height: 160 },
            layout: {
              layoutMode: 'VERTICAL',
              itemSpacing: 8,
              paddingTop: 16,
              paddingRight: 16,
              paddingBottom: 16,
              paddingLeft: 16,
              primaryAxisSizingMode: 'FIXED',
              counterAxisSizingMode: 'FIXED',
            },
            fills: [{ type: 'SOLID', color: { r: 1, g: 1, b: 1 } }],
            children: [
              {
                type: 'TEXT',
                id: 't1',
                characters: 'Hello from claude-to-figma',
                textStyle: { fontFamily: 'Inter', fontStyle: 'Regular', fontSize: 16 },
                fills: [{ type: 'SOLID', color: { r: 0.08, g: 0.08, b: 0.1 } }],
              },
            ],
          },
        },
        null,
        2,
      );
    </script>
  </body>
</html>
